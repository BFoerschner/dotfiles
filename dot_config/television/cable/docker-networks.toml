[metadata]
name = "docker-networks"
description = "List and manage Docker networks"
requirements = ["docker", "jq"]

[source]
command = "docker network ls --format '{{.Name}}\\t{{.Driver}}\\t{{.Scope}}'"
display = "{split:\\t:0} ({split:\\t:1}, {split:\\t:2})"
output = "{split:\\t:0}"

[preview]
command = "docker network inspect '{split:\\t:0}' 2>/dev/null | jq -C \"$FILTER\""

[preview.env]
FILTER = '.[0] | {Name, Driver, Scope, IPAM: (.IPAM.Config // []), Containers: [(.Containers // {}) | to_entries[] | {name: .value.Name, ipv4: .value.IPv4Address}]}'

[keybindings]
ctrl-d = ["actions:remove", "reload_source"]

[actions.remove]
description = "Remove network"
command = "docker network rm '{split:\\t:0}'"
mode = "fork"
