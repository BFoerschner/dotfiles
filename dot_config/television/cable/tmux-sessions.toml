[metadata]
name = "tmux-sessions"
description = "Manage tmux sessions"
requirements = ["tmux"]

[source]
command = [
  "tmux list-sessions -F '#{session_name}' 2>/dev/null | sort",
  "$HOME/.local/bin/repo-list-github",
  "$HOME/.local/bin/repo-list-gitea",
]

[preview]
command = "$HOME/.local/bin/tmux-preview '{}'"
env = { TERM = "xterm-256color", CLICOLOR_FORCE = "1" }

[keybindings]
tab = "scroll_preview_half_page_down"
backtab = "scroll_preview_half_page_up"
enter = "actions:switch"
ctrl-n = "actions:create"
ctrl-d = ["actions:kill", "reload_source"]
ctrl-r = ["actions:rescan", "reload_source"]
f2 = "actions:rename"

[actions.switch]
description = "Switch to session or clone repo"
command = "case '{}' in github:*|gitea:*) $HOME/.local/bin/repo-clone-session '{}' ;; *) tmux switch-client -t '{}' ;; esac"
mode = "execute"

[actions.kill]
description = "Kill session"
command = "tmux kill-session -t '{}'"
mode = "fork"

[actions.create]
description = "Create new session"
command = "$HOME/.local/bin/tmux-session-create"
mode = "execute"

[actions.rename]
description = "Rename session"
command = "$HOME/.local/bin/tmux-session-rename '{}'"
mode = "execute"

[actions.rescan]
description = "Rescan git project directories"
command = "$HOME/.local/bin/tmux-git-sessions scan"
mode = "fork"
